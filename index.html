<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulMask サーバー設定エディタ(GameXishu.json)</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #161b27;
    --bg-card: #1e2433;
    --bg-hover: #252d3f;
    --border: #2a3350;
    --border-light: #3a4a6a;
    --gold: #c9a227;
    --gold-light: #e8bb3a;
    --gold-dark: #a07e18;
    --amber: #d4870a;
    --text-primary: #e8eaf0;
    --text-secondary: #9aa3b8;
    --text-muted: #5a6480;
    --accent-blue: #3d6fce;
    --accent-green: #3aac6e;
    --accent-red: #c94040;
    --tab-active: #c9a227;
    --input-bg: #0d1220;
    --input-border: #2a3a5a;
    --input-focus: #c9a227;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, #0a0d15 0%, #1a1f35 50%, #0d1220 100%);
    border-bottom: 2px solid var(--gold-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(201,162,39,0.2);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .header-title h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px rgba(201,162,39,0.4);
  }
  .header-title p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s ease;
    white-space: nowrap;
    text-decoration: none;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #0a0d15;
  }
  .btn-primary:hover { background: linear-gradient(135deg, var(--gold), var(--gold-light)); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(201,162,39,0.4); }
  .btn-secondary {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border-light);
  }
  .btn-secondary:hover { background: var(--bg-hover); border-color: var(--gold-dark); }
  .btn-danger {
    background: rgba(201,64,64,0.15);
    color: #f08080;
    border: 1px solid rgba(201,64,64,0.3);
  }
  .btn-danger:hover { background: rgba(201,64,64,0.25); border-color: var(--accent-red); }
  .btn-file {
    background: linear-gradient(135deg, #1e3a5f, #254a7f);
    color: var(--text-primary);
    border: 1px solid var(--accent-blue);
    cursor: pointer;
  }
  .btn-file:hover { background: linear-gradient(135deg, #254a7f, #2e5a99); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(61,111,206,0.3); }
  input[type="file"] { display: none; }

  /* STATUS BAR */
  .status-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .status-bar .status-msg {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .status-dot.loaded { background: var(--accent-green); box-shadow: 0 0 6px rgba(58,172,110,0.5); }
  .status-dot.idle { background: var(--amber); }

  /* MAIN */
  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* TABS */
  .tabs-header {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-btn {
    padding: 12px 22px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.18s ease;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
  .tab-btn.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
    background: rgba(201,162,39,0.05);
  }
  .tab-badge {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .tab-btn.active .tab-badge {
    background: rgba(201,162,39,0.15);
    border-color: var(--gold-dark);
    color: var(--gold);
  }

  /* TAB PANELS */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CATEGORY */
  .category {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px;
    cursor: pointer;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    user-select: none;
    transition: background 0.15s;
  }
  .category-header:hover { background: var(--bg-hover); }
  .category-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
  }
  .category-icon {
    width: 26px;
    height: 26px;
    background: rgba(201,162,39,0.12);
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }
  .category-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .toggle-icon {
    color: var(--text-muted);
    font-size: 16px;
    transition: transform 0.2s;
    line-height: 1;
  }
  .category.collapsed .toggle-icon { transform: rotate(-90deg); }
  .category-body {
    padding: 12px 16px 16px;
  }
  .category.collapsed .category-body { display: none; }

  /* PARAM ROWS */
  .param-row {
    display: grid;
    grid-template-columns: 220px 1fr 200px;
    gap: 12px;
    align-items: start;
    padding: 9px 2px;
    border-bottom: 1px solid rgba(42,51,80,0.5);
    transition: background 0.12s;
    border-radius: 4px;
  }
  .param-row:last-child { border-bottom: none; }
  .param-row:hover { background: rgba(255,255,255,0.02); }
  .param-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    padding-top: 7px;
    word-break: break-word;
  }
  .param-label .label-desc {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .param-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .param-key {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Consolas', 'Courier New', monospace;
    padding-top: 8px;
    word-break: break-all;
    opacity: 0.75;
  }

  /* INPUTS */
  input[type="number"],
  input[type="text"],
  select.param-select {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-primary);
    border-radius: var(--radius);
    padding: 7px 10px;
    font-size: 13px;
    width: 100%;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
  input:focus, select:focus {
    outline: none;
    border-color: var(--input-focus);
    box-shadow: 0 0 0 2px rgba(201,162,39,0.15);
  }
  select.param-select option {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  /* TOGGLE SWITCH */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 4px;
  }
  .toggle-switch {
    position: relative;
    width: 46px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a2035;
    border: 1px solid var(--border-light);
    border-radius: 24px;
    transition: all 0.2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    left: 2px;
    top: 2px;
    background: var(--text-muted);
    transition: all 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: rgba(201,162,39,0.2);
    border-color: var(--gold-dark);
  }
  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(22px);
    background: var(--gold);
    box-shadow: 0 0 6px rgba(201,162,39,0.5);
  }
  .toggle-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 30px;
  }
  .toggle-switch input:checked ~ .toggle-label { color: var(--gold); }

  /* SEARCH */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
    max-width: 380px;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-primary);
    border-radius: var(--radius);
    padding: 8px 10px 8px 33px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: var(--input-focus); }
  .search-input::placeholder { color: var(--text-muted); }
  .expand-all-btn, .collapse-all-btn {
    padding: 7px 13px;
    font-size: 12px;
  }

  /* HIGHLIGHT for search */
  .param-row.search-hide { display: none; }
  .category.search-empty .category-body { display: block; }
  .category.search-empty .category-header .category-count::after { content: ' (0件)'; color: var(--accent-red); }

  /* TOOLTIP */
  .has-tooltip {
    position: relative;
  }
  .tooltip-text {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: #0a0f1a;
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 5px;
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
    box-shadow: var(--shadow);
    max-width: 280px;
    white-space: normal;
    line-height: 1.4;
  }
  .has-tooltip:hover .tooltip-text { display: block; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow);
    animation: slideIn 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 320px;
  }
  .toast-success { background: #1a3a2a; border: 1px solid #2a6040; color: #60d090; }
  .toast-error { background: #3a1a1a; border: 1px solid #6a2020; color: #f08080; }
  .toast-info { background: #1a2a3a; border: 1px solid #2a4060; color: #80b0e0; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

  /* PRESET INFO BOX */
  .preset-info-box {
    background: rgba(42, 55, 90, 0.3);
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--gold-dark);
    border-radius: var(--radius);
    padding: 12px 18px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .preset-info-box strong {
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }

  /* RANGE HINT */
  .range-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    padding-left: 1px;
    opacity: 0.85;
  }

  /* COPY BAR (Preset 1 only) */
  .copy-bar {
    background: linear-gradient(135deg, rgba(61,111,206,0.10), rgba(201,162,39,0.10));
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .copy-bar-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .copy-bar-label::before {
    content: '🔄';
    font-size: 14px;
  }
  .btn-copy {
    background: rgba(61,111,206,0.18);
    color: #a8c4f0;
    border: 1px solid rgba(61,111,206,0.45);
    padding: 7px 14px;
    font-size: 12px;
  }
  .btn-copy:hover {
    background: rgba(61,111,206,0.32);
    border-color: var(--accent-blue);
    transform: translateY(-1px);
  }
  .btn-copy-all {
    background: rgba(201,162,39,0.18);
    color: var(--gold-light);
    border: 1px solid rgba(201,162,39,0.5);
    padding: 7px 14px;
    font-size: 12px;
  }
  .btn-copy-all:hover {
    background: rgba(201,162,39,0.32);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .param-row { grid-template-columns: 1fr; gap: 6px; }
    .param-key { padding-top: 0; }
    .main-container { padding: 16px; }
    .header-inner { padding: 12px 16px; }
  }
  @media (max-width: 580px) {
    .header-title h1 { font-size: 16px; }
    .tab-btn { padding: 10px 14px; font-size: 12px; }
    .btn { padding: 8px 13px; font-size: 12px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-icon">⚔️</div>
      <div>
        <h1>SoulMask サーバー設定エディタ(GameXishu.json)</h1>
        <p>ブラウザ完結型編集ツール</p>
      </div>
    </div>
    <div class="header-actions">
      <label class="btn btn-file">
        📂 JSONファイルを読み込む
        <input type="file" id="fileInput" accept=".json">
      </label>
      <button class="btn btn-danger" id="resetBtn">↺ デフォルト値にリセット</button>
      <button class="btn btn-primary" id="downloadBtn">💾 JSONをダウンロード</button>
    </div>
  </div>
</header>

<div class="status-bar">
  <div class="status-msg">
    <span class="status-dot idle" id="statusDot"></span>
    <span id="statusText">ファイル未読み込み — JSONファイルを読み込むか、直接値を編集してください</span>
  </div>
</div>

<div class="main-container">
  <div class="tabs-header" id="tabsHeader">
    <button class="tab-btn active" data-tab="0">
      🌐 プリセット0 (全セクション共通)
      <span class="tab-badge" id="badge-0">0</span>
    </button>
    <button class="tab-btn" data-tab="1">
      ⚙️ プリセット1 (カスタム推奨)
      <span class="tab-badge" id="badge-1">0</span>
    </button>
    <button class="tab-btn" data-tab="2">
      🗺️ プリセット2 (サブマップ)
      <span class="tab-badge" id="badge-2">0</span>
    </button>
  </div>

  <div id="preset-desc" class="preset-info-box"></div>

  <div id="tab-0" class="tab-panel active"></div>
  <div id="tab-1" class="tab-panel"></div>
  <div id="tab-2" class="tab-panel"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="footer">
  SoulMask サーバー設定エディタ — ローカル完結型ツール。データはブラウザ外に送信されません。
</div>

<script>
// =====================================================================
// PARAMETER SCHEMA
// =====================================================================
const CATEGORIES = [
  {
    id: 'exp', label: '経験値・成長', icon: '📈',
    params: [
      { key: 'ExpRatio', label: '経験値倍率', desc: 'マスク覚醒XP全般。大きい=早く強くなる', tip: '5以上は早回しサーバー向き', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'ChengZhangExpRatio', label: '成長経験値倍率', desc: 'キャラクター成長XP', tip: '高難度=0.5、ライト=3〜5', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'MJExpRatio', label: '秘技経験値倍率', desc: 'マスクXP (秘技習得用)', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'ShuLianDuExpRatio', label: '熟練度経験値倍率', desc: '武器/技能の熟練度XP', tip: '高倍率(10前後)で熟練解放を加速可', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'CaiJiExpRatio', label: '採集経験値倍率', desc: '採集行為で得るXP', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'ZhiZuoExpRatio', label: '製作経験値倍率', desc: 'アイテム製作で得るXP', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'ShaGuaiExpRatio', label: '敵討伐経験値倍率', desc: '敵討伐で得るXP', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'QiTaExpRatio', label: 'その他経験値倍率', desc: '上記以外のXP', type: 'number', step: 0.1, min: 0, max: 10, def: 1 },
      { key: 'TrainingExpRatio', label: '訓練経験値倍率', desc: '訓練所での配下XP', tip: '最大100倍まで設定可', type: 'number', step: 0.1, min: 0, max: 100, def: 1 },
      { key: 'ShaGuaiExpShareRatio', label: '討伐経験値共有率', desc: 'パーティ討伐時のXP共有率', type: 'number', step: 0.1, min: 0, max: 5, def: 1 },
      { key: 'ChuZhanZuRenShaGuaiExpShareRatio', label: '出撃配下の討伐経験値共有率', desc: '配下と一緒に討伐した時の共有率', type: 'number', step: 0.1, min: 0, max: 5, def: 1 },
      { key: 'OtherShaGuaiExpShareRatio', label: 'その他討伐経験値共有率', desc: '上記以外の共有XP', type: 'number', step: 0.1, min: 0, max: 5, def: 1 },
    ]

const TABS = ['0', '1', '2'];

function buildTabContent(tabId) {
  const panel = document.getElementById('tab-' + tabId);
  panel.innerHTML = '';

  // Search + controls row
  const searchBar = document.createElement('div');
  searchBar.className = 'search-bar';
  searchBar.innerHTML = `
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="パラメータ名で検索..." data-tab="${tabId}" autocomplete="off">
    </div>
    <button class="btn btn-secondary expand-all-btn" data-tab="${tabId}" data-action="expand">全て展開</button>
    <button class="btn btn-secondary collapse-all-btn" data-tab="${tabId}" data-action="collapse">全て折り畳む</button>
  `;
  panel.appendChild(searchBar);

  // Copy bar (Preset 1 only)
  if (tabId === '1') {
    const copyBar = document.createElement('div');
    copyBar.className = 'copy-bar';
    copyBar.innerHTML = `
      <span class="copy-bar-label">このタブの値を他プリセットへ反映:</span>
      <button class="btn btn-copy" data-copy-target="0">→ プリセット0へ反映</button>
      <button class="btn btn-copy" data-copy-target="2">→ プリセット2へ反映</button>
      <button class="btn btn-copy-all" data-copy-target="both">→ 0/2 両方へ反映 (推奨)</button>
    `;
    panel.appendChild(copyBar);

    copyBar.querySelectorAll('[data-copy-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.copyTarget;
        const targets = target === 'both' ? ['0', '2'] : [target];
        if (!confirm(`プリセット1の全パラメータをプリセット${targets.join('・')}へ上書きコピーします。よろしいですか?`)) return;
        const count = copyTabValues('1', targets);
        const label = targets.length === 2 ? 'プリセット0と2' : 'プリセット' + targets[0];
        showToast('success', `✓ ${count}件のパラメータを${label}へ反映しました`);
      });
    });
  }

  let totalParams = 0;
  CATEGORIES.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.dataset.catId = cat.id;
    catDiv.dataset.tabId = tabId;

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <div class="category-title">
        <span class="category-icon">${cat.icon}</span>
        ${cat.label}
        <span class="category-count">(${cat.params.length}件)</span>
      </div>
      <span class="toggle-icon">▾</span>
    `;
    header.addEventListener('click', () => {
      catDiv.classList.toggle('collapsed');
    });
    catDiv.appendChild(header);

    const body = document.createElement('div');
    body.className = 'category-body';

    cat.params.forEach(param => {
      const row = buildParamRow(tabId, param);
      body.appendChild(row);
      totalParams++;
    });

    catDiv.appendChild(body);
    panel.appendChild(catDiv);
  });

  // Update badge
  document.getElementById('badge-' + tabId).textContent = totalParams;

  // Search handler
  searchBar.querySelector('.search-input').addEventListener('input', function() {
    handleSearch(tabId, this.value);
  });

  // Expand/collapse all
  searchBar.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      panel.querySelectorAll('.category').forEach(c => {
        if (action === 'expand') c.classList.remove('collapsed');
        else c.classList.add('collapsed');
      });
    });
  });
}

function buildParamRow(tabId, param) {
  const row = document.createElement('div');
  row.className = 'param-row';
  row.dataset.key = param.key.toLowerCase();
  row.dataset.label = param.label.toLowerCase();

  // Label col
  const labelDiv = document.createElement('div');
  labelDiv.className = 'param-label';
  labelDiv.innerHTML = param.label;
  if (param.desc) {
    const descSpan = document.createElement('span');
    descSpan.className = 'label-desc';
    descSpan.textContent = param.desc;
    labelDiv.appendChild(descSpan);
  }
  row.appendChild(labelDiv);

  // Input col
  const inputWrap = document.createElement('div');
  inputWrap.className = 'param-input-wrap';
  let inputEl;

  if (param.type === 'switch') {
    const wrap = document.createElement('div');
    wrap.className = 'toggle-wrap';

    const label = document.createElement('label');
    label.className = 'toggle-switch';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.dataset.paramKey = param.key;
    chk.dataset.tabId = tabId;
    const slider = document.createElement('span');
    slider.className = 'toggle-slider';
    label.appendChild(chk);
    label.appendChild(slider);
    wrap.appendChild(label);

    const lbl = document.createElement('span');
    lbl.className = 'toggle-label';
    lbl.textContent = chk.checked ? 'ON' : 'OFF';
    chk.addEventListener('change', () => { lbl.textContent = chk.checked ? 'ON' : 'OFF'; });
    wrap.appendChild(lbl);

    // Set default
    chk.checked = param.def === 1;
    lbl.textContent = chk.checked ? 'ON' : 'OFF';

    inputWrap.appendChild(wrap);
    inputEl = chk;
  } else if (param.type === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.dataset.paramKey = param.key;
    inp.dataset.tabId = tabId;
    if (param.step !== undefined) inp.step = param.step;
    if (param.min !== undefined) inp.min = param.min;
    if (param.max !== undefined) inp.max = param.max;
    inp.value = param.def !== undefined ? param.def : '';
    inputWrap.appendChild(inp);
    inputEl = inp;
  } else {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.dataset.paramKey = param.key;
    inp.dataset.tabId = tabId;
    inp.value = param.def !== undefined ? param.def : '';
    inputWrap.appendChild(inp);
    inputEl = inp;
  }

  // Range hint
  const rangeHint = document.createElement('div');
  rangeHint.className = 'range-hint';
  let rangeText = '';
  if (param.type === 'switch') {
    rangeText = '値: 0 = OFF / 1 = ON';
  } else if (param.type === 'text') {
    rangeText = '形式: HH:MM';
  } else {
    const hasMin = param.min !== undefined;
    const hasMax = param.max !== undefined;
    if (hasMin && hasMax) {
      rangeText = `範囲: ${param.min} 〜 ${param.max}`;
    } else if (hasMin) {
      rangeText = `範囲: ${param.min} 以上`;
    }
  }
  if (param.tip) {
    rangeText += (rangeText ? ' / ' : '') + '推奨: ' + param.tip;
  }
  if (rangeText) {
    rangeHint.textContent = rangeText;
    inputWrap.appendChild(rangeHint);
  }

  row.appendChild(inputWrap);

  // Key col
  const keyDiv = document.createElement('div');
  keyDiv.className = 'param-key';
  keyDiv.textContent = param.key;
  row.appendChild(keyDiv);

  // Register
  if (inputEl) {
    inputRegistry[tabId][param.key] = inputEl;
  }

  return row;
}

function handleSearch(tabId, query) {
  const panel = document.getElementById('tab-' + tabId);
  const q = query.toLowerCase().trim();
  panel.querySelectorAll('.category').forEach(catDiv => {
    let anyVisible = false;
    catDiv.querySelectorAll('.param-row').forEach(row => {
      if (!q || row.dataset.key.includes(q) || row.dataset.label.includes(q)) {
        row.classList.remove('search-hide');
        anyVisible = true;
      } else {
        row.classList.add('search-hide');
      }
    });
    // Show/hide category based on results
    if (q && !anyVisible) {
      catDiv.classList.add('search-empty');
    } else {
      catDiv.classList.remove('search-empty');
      if (q && anyVisible) catDiv.classList.remove('collapsed');
    }
  });
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const json = JSON.parse(ev.target.result);
      loadFromJSON(json);
      setStatus('loaded', `読み込み済み: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
      showToast('success', `✓ ${file.name} を読み込みました`);
    } catch(err) {
      showToast('error', `JSONの解析に失敗しました: ${err.message}`);
    }
  };
  reader.readAsText(file, 'utf-8');
  // Reset so same file can be re-loaded
  this.value = '';
});

function loadFromJSON(json) {
  TABS.forEach(tabId => {
    const section = json[tabId];
    if (!section || typeof section !== 'object') return;
    const reg = inputRegistry[tabId];
    Object.entries(section).forEach(([key, val]) => {
      if (reg[key]) {
        setInputValue(reg[key], val);
      }
    });
  });
}

function setInputValue(el, val) {
  if (el.type === 'checkbox') {
    el.checked = (val === 1 || val === true || val === '1');
    // Fire change to update label
    el.dispatchEvent(new Event('change'));
  } else {
    el.value = val;
  }
}

// Copy all current values from source tab to target tab(s)
function copyTabValues(sourceTabId, targetTabIds) {
  const srcReg = inputRegistry[sourceTabId];
  let count = 0;
  Object.keys(srcReg).forEach(key => {
    const srcEl = srcReg[key];
    const val = srcEl.type === 'checkbox' ? (srcEl.checked ? 1 : 0) : srcEl.value;
    targetTabIds.forEach(tabId => {
      const dstEl = inputRegistry[tabId] && inputRegistry[tabId][key];
      if (dstEl) {
        setInputValue(dstEl, val);
        count++;
      }
    });
  });
  return count;
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('全タブのすべての値をデフォルトにリセットしますか？')) return;
  TABS.forEach(tabId => {
    const reg = inputRegistry[tabId];
    CATEGORIES.forEach(cat => {
      cat.params.forEach(param => {
        const el = reg[param.key];
        if (!el) return;
        setInputValue(el, param.def !== undefined ? param.def : (param.type === 'switch' ? 0 : ''));
      });
    });
  });
  setStatus('idle', 'デフォルト値にリセットしました');
  showToast('info', '↺ デフォルト値にリセットしました');
});

// DOWNLOAD
// =====================================================================
document.getElementById('downloadBtn').addEventListener('click', () => {
  const output = {};
  TABS.forEach(tabId => {
    output[tabId] = {};
    const reg = inputRegistry[tabId];
    CATEGORIES.forEach(cat => {
      cat.params.forEach(param => {
        const el = reg[param.key];
        if (!el) return;
        let val;
        if (el.type === 'checkbox') {
          val = el.checked ? 1 : 0;
        } else if (param.type === 'number') {
          val = el.value === '' ? null : Number(el.value);
        } else {
          val = el.value;
        }
        // Only write non-null values; avoid duplicates (last write wins for dup keys)
        if (val !== null) {
          output[tabId][param.key] = val;
        }
      });
    });
  });

  const jsonStr = JSON.stringify(output, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'GameXishu.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('success', '✓ GameXishu.json をダウンロードしました');
});

// =====================================================================
// STATUS & TOAST
// =====================================================================
function setStatus(type, msg) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = msg;
}

function showToast(type, msg) {
  const tc = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  tc.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 320);
  }, 3000);
}

// =====================================================================
// INIT
// =====================================================================
TABS.forEach(t => buildTabContent(t));
updatePresetDesc('0');
setStatus('idle', 'ファイル未読み込み — JSONファイルを読み込むか、直接値を編集してください');
</script>
